services:
  - type: web
    name: ilg-central-operacional
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: WHATSAPP_WEBHOOK_SECRET
        generateValue: true
